<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#faf8f5" id="theme-color-meta" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>刷题助手</title>
    <script>
      (function(){
        var palettes={copper:{light:'#faf8f5',dark:'#0f0e0c'},ocean:{light:'#f5f8fc',dark:'#0a0f1a'},forest:{light:'#f5faf6',dark:'#0a120e'},lavender:{light:'#f8f5fc',dark:'#0e0a14'},rose:{light:'#fcf5f7',dark:'#140a0e'},slate:{light:'#f6f7f9',dark:'#0c0d10'}};
        var t=localStorage.getItem('theme')||'system';
        var p=localStorage.getItem('color_palette')||'copper';
        var isDark=t==='dark'||(t==='system'&&matchMedia('(prefers-color-scheme:dark)').matches);
        var c=(palettes[p]||palettes.copper)[isDark?'dark':'light'];
        document.getElementById('theme-color-meta').setAttribute('content',c);
        document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
        document.documentElement.setAttribute('data-palette',p);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
